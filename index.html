<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memorama Mundial 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap');

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #1a365d 0%, #000000 100%);
            min-height: 100vh;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        .game-container {
            perspective: 1000px;
        }

        .card {
            width: 100%;
            aspect-ratio: 3/4;
            cursor: pointer;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .card.flipped {
            transform: rotateY(180deg);
        }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            border: 2px solid rgba(255,255,255,0.1);
        }

        .card-front {
            background: linear-gradient(45deg, #2563eb, #ef4444); /* Colores USA/MX */
            transform: rotateY(0deg);
        }

        .card-front::after {
            content: "⚽";
            font-size: 2rem;
            opacity: 0.3;
        }

        .card-back {
            background-color: #ffffff;
            color: #1a365d;
            transform: rotateY(180deg);
        }

        .card.matched .card-back {
            background-color: #10b981;
            color: white;
            border-color: #059669;
        }

        .grid-layout {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            max-width: 600px;
            width: 95%;
            margin-top: 20px;
        }

        @media (max-width: 400px) {
            .grid-layout {
                gap: 8px;
            }
        }

        .confetti {
            position: fixed;
            width: 10px;
            height: 10px;
            background-color: #f00;
            z-index: 100;
        }

        .stats-panel {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 15px 30px;
            margin-bottom: 20px;
            display: flex;
            gap: 30px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.85);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(5px);
        }

        .modal.show {
            display: flex;
        }
    </style>
</head>
<body>

    <header class="text-center mt-8 mb-4 px-4">
        <h1 class="text-4xl md:text-5xl font-800 tracking-tighter uppercase italic">
            Mundial <span class="text-blue-500">20</span><span class="text-red-500">26</span>
        </h1>
        <p class="text-gray-400 font-semibold tracking-widest mt-1">MEMORAMA CHALLENGE</p>
    </header>

    <div class="stats-panel text-sm md:text-lg">
        <div>Movimientos: <span id="moves" class="font-bold text-yellow-400">0</span></div>
        <div>Tiempo: <span id="timer" class="font-bold text-yellow-400">00:00</span></div>
    </div>

    <main class="grid-layout" id="game-board">
        <!-- Las cartas se generan dinámicamente -->
    </main>

    <div class="mt-8 mb-12">
        <button onclick="resetGame()" class="bg-white text-black font-bold py-3 px-8 rounded-full hover:bg-yellow-400 transition-colors shadow-lg">
            REINICIAR JUEGO
        </button>
    </div>

    <!-- Modal de Victoria -->
    <div id="victory-modal" class="modal px-4">
        <div class="bg-white text-black p-8 rounded-3xl max-w-sm w-full text-center shadow-2xl">
            <h2 class="text-3xl font-bold mb-2">¡CAMPEÓN! 🏆</h2>
            <p class="text-gray-600 mb-6" id="victory-text"></p>
            <button onclick="closeModal()" class="w-full bg-blue-600 text-white font-bold py-3 rounded-xl hover:bg-blue-700 transition-all">
                JUGAR DE NUEVO
            </button>
        </div>
    </div>

    <script>
        const symbols = [
            '🏆', '⚽', '🇲🇽', '🇺🇸', '🇨🇦', '🏟️', '🧤', '👟',
            '🏆', '⚽', '🇲🇽', '🇺🇸', '🇨🇦', '🏟️', '🧤', '👟'
        ];

        let flippedCards = [];
        let matchedCount = 0;
        let moves = 0;
        let timerSeconds = 0;
        let timerInterval = null;
        let isLocked = false;

        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function createBoard() {
            const board = document.getElementById('game-board');
            board.innerHTML = '';
            const shuffledSymbols = shuffle([...symbols]);

            shuffledSymbols.forEach((symbol, index) => {
                const card = document.createElement('div');
                card.className = 'card';
                card.dataset.symbol = symbol;
                card.dataset.index = index;

                card.innerHTML = `
                    <div class="card-face card-front"></div>
                    <div class="card-back card-face text-4xl">${symbol}</div>
                `;

                card.addEventListener('click', () => flipCard(card));
                board.appendChild(card);
            });
        }

        function flipCard(card) {
            if (isLocked || card.classList.contains('flipped') || card.classList.contains('matched')) return;

            // Iniciar timer en el primer movimiento
            if (moves === 0 && flippedCards.length === 0) startTimer();

            card.classList.add('flipped');
            flippedCards.push(card);

            if (flippedCards.length === 2) {
                checkMatch();
            }
        }

        function checkMatch() {
            isLocked = true;
            moves++;
            document.getElementById('moves').textContent = moves;

            const [card1, card2] = flippedCards;
            const isMatch = card1.dataset.symbol === card2.dataset.symbol;

            if (isMatch) {
                card1.classList.add('matched');
                card2.classList.add('matched');
                matchedCount += 2;
                flippedCards = [];
                isLocked = false;

                if (matchedCount === symbols.length) {
                    endGame();
                }
            } else {
                setTimeout(() => {
                    card1.classList.remove('flipped');
                    card2.classList.remove('flipped');
                    flippedCards = [];
                    isLocked = false;
                }, 1000);
            }
        }

        function startTimer() {
            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                timerSeconds++;
                const mins = Math.floor(timerSeconds / 60).toString().padStart(2, '0');
                const secs = (timerSeconds % 60).toString().padStart(2, '0');
                document.getElementById('timer').textContent = `${mins}:${secs}`;
            }, 1000);
        }

        function endGame() {
            clearInterval(timerInterval);
            const timeStr = document.getElementById('timer').textContent;
            document.getElementById('victory-text').innerHTML = `
                Completaste el reto en <b>${moves}</b> movimientos y un tiempo de <b>${timeStr}</b>.
            `;
            setTimeout(() => {
                document.getElementById('victory-modal').classList.add('show');
                createConfetti();
            }, 500);
        }

        function closeModal() {
            document.getElementById('victory-modal').classList.remove('show');
            resetGame();
        }

        function resetGame() {
            clearInterval(timerInterval);
            timerSeconds = 0;
            moves = 0;
            matchedCount = 0;
            flippedCards = [];
            isLocked = false;
            document.getElementById('timer').textContent = '00:00';
            document.getElementById('moves').textContent = '0';
            createBoard();
        }

        function createConfetti() {
            for (let i = 0; i < 50; i++) {
                const confetti = document.createElement('div');
                confetti.className = 'confetti';
                confetti.style.left = Math.random() * 100 + 'vw';
                confetti.style.backgroundColor = ['#2563eb', '#ef4444', '#ffffff', '#fbbf24'][Math.floor(Math.random()*4)];
                confetti.style.top = '-10px';
                confetti.style.transform = `rotate(${Math.random() * 360}deg)`;
                document.body.appendChild(confetti);

                const animation = confetti.animate([
                    { transform: `translate3d(0,0,0) rotate(0deg)`, opacity: 1 },
                    { transform: `translate3d(${(Math.random() - 0.5) * 200}px, 100vh, 0) rotate(${Math.random() * 720}deg)`, opacity: 0 }
                ], {
                    duration: 2000 + Math.random() * 3000,
                    easing: 'cubic-bezier(0, .9, .57, 1)'
                });

                animation.onfinish = () => confetti.remove();
            }
        }

        // Inicializar el juego
        window.onload = createBoard;

    </script>
</body>
</html>
